name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'  # Newer Flutter defaults to Kotlin 1.9+; patch still applied below for safety
          channel: 'stable'

      - name: Ensure platform folders exist (generates android/ if missing)
        run: flutter create . --platforms android --project-name virtual_pet_app

      - name: Patch Kotlin version for compatibility (fixes 1.9 stdlib vs old plugin)
        run: |
          sed -i 's/version "1\.7\.[0-9]*"/version "1.9.24"/g' android/settings.gradle || true
          sed -i 's/ext\.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle || true

      - name: Get dependencies
        run: flutter pub get

      - name: Upgrade packages (to get compatible plugin versions and avoid v1 embedding issues)
        run: flutter pub upgrade

      - name: Patch NDK version (force 27 for audioplayers/vibration/path_provider etc. - they declare 27)
        run: |
          # Patch .kts (most common with recent Flutter)
          sed -i '/ndkVersion/c\    ndkVersion = "27.0.12077973"' android/app/build.gradle.kts || true
          # Patch .gradle if present
          sed -i '/ndkVersion/c\    ndkVersion "27.0.12077973"' android/app/build.gradle || true
          # Fallback replace any old NDK strings
          sed -i 's/26\.3\.[0-9]*/27.0.12077973/g' android/app/build.gradle.kts || true
          sed -i 's/26\.3\.[0-9]*/27.0.12077973/g' android/app/build.gradle || true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtual-pet-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Rename for easy download
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk virtual-pet-whale-cow-snake.apk

      - name: Upload renamed APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbles-Virtual-Pet-APK
          path: virtual-pet-whale-cow-snake.apk
          retention-days: 30
